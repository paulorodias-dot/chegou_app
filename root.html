<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Root - Chegou!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>👑 Painel de Controle Root</h1>
        <p>Gerenciamento Global de Condomínios</p>
    </header>

    <nav class="admin-nav" id="menu-navegacao-dinamico" style="display: none;">
        <div class="nav-container">
            <button id="btn-root" onclick="location.href='root.html'" class="nav-item">👑 Mestre</button>
            <button onclick="location.href='admin.html'" class="nav-item">🏢 Administrativo</button>
            <button onclick="location.href='portaria.html'" class="nav-item">🛂 Portaria</button>
            <button onclick="location.href='morador.html'" class="nav-item">🏠 Morador</button>
            <button onclick="logout()" class="nav-item btn-sair-nav">🚪 Sair</button>
        </div>
    </nav>

    <main class="container">
        <div class="modal-grid"> 
            <section class="card" style="width: 100%; height: auto; min-height: 200px;">
                <span class="module-icon">🔔</span>
                <h3>Solicitações</h3>
                <div id="listaPendentes" style="width: 100%; margin-top: 15px; font-size: 0.9rem;">
                    Carregando solicitações...
                </div>
            </section>

            <section class="card" style="width: 100%; height: auto; min-height: 200px;">
                <span class="module-icon">✅</span>
                <h3>Ativos</h3>
                <div id="corpoTabelaAtivos" style="width: 100%; margin-top: 15px; font-size: 0.9rem;">
                    Buscando condomínios ativos...
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Use esse formato para não anular as funções que já estão no app.js
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof carregarDadosRoot === 'function') {
                carregarDadosRoot();
            }
        });
    </script>
</body>
</html>
