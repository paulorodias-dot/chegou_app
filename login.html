<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chegou!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Chegou!</h1>
        <p>Identifique-se para acessar o portal</p>
    </header>

    <main class="container">
        <section class="hero" style="padding: 40px 20px;">
            <h2 id="titulo-login" style="margin-bottom: 20px;">Acesso ao Portal</h2>
            
            <div style="max-width: 350px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;">
                <input type="email" id="email" placeholder="E-mail ou Usuário" 
                       style="padding: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none;">
                
                <input type="password" id="senha" placeholder="Sua Senha" 
                       style="padding: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none;">
                
                <button class="btn-login-main" onclick="handleLogin()">Entrar</button>
                
                <a href="index.html" style="color: var(--primary); font-weight: bold; text-decoration: none; font-size: 0.9rem;">Voltar ao início</a>
            </div>

            <div id="msg-erro" style="color: #e74c3c; margin-top: 15px; font-weight: bold; display: none;"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const perfil = params.get('perfil');
        if(perfil) {
            const nomes = { 'admin': 'Administrativo', 'portaria': 'Portaria', 'morador': 'Morador' };
            document.getElementById('titulo-login').innerText = 'Acesso ' + nomes[perfil];
        }
    </script>
</body>
</html>
