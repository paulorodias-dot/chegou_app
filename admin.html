<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Chegou!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/landing.css">
    <style>
        /* Ajuste de cor para diferenciar do Master (um azul/ciano profissional) */
        .tag-admin {
            background: #e0f2fe;
            color: #0369a1;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid #bae6fd;
        }
    </style>
</head>
<body class="bg-sistema">

    <header class="navbar">
        <div class="nav-left">
            <div class="logo">Chegou<span>!</span></div>
        </div>
        <div class="nav-center">
            <span class="tag-admin">PAINEL ADMINISTRATIVO</span>
        </div>
        <div class="nav-right">
            <button class="btn-restrito" onclick="logout()">Sair</button>
        </div>
    </header>

    <main class="main-content">
        <div class="full-width-status">
            <div id="current-date">
                <span id="datetime">Carregando data...</span>
                <span id="weather-container"></span>
            </div>
        </div>

        <div id="admin-container" class="container-central">
            <div class="card-painel">
                <div class="icon" style="font-size: 3rem; color: #0369a1; margin-bottom: 20px;">
                    <i class="fa-solid fa-building-shield"></i>
                </div>
                <h2 id="nome-condominio" style="margin-bottom: 10px; font-weight: 800;">Meu Condomínio</h2>
                <p style="color: var(--text-muted); margin-bottom: 30px;">
                    Bem-vindo, <span id="nome-usuario">Síndico</span>. Gerencie os moradores e porteiros da sua unidade.
                </p>
                
                <div style="border: 2px dashed #e2e8f0; padding: 30px; border-radius: 15px;">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Pronto para gerenciar moradores e encomendas.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
